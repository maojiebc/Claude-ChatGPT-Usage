<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude 用量图标验收</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 30% 20%, #fffaf7 0, transparent 34%),
          #f5f4f1;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .preview-note {
        position: fixed;
        top: 32px;
        left: 40px;
        color: #77736e;
        font-size: 13px;
      }
      .reference-card {
        position: fixed;
        top: 76px;
        left: 40px;
        width: 760px;
        padding: 16px;
        border: 1px solid rgba(80, 75, 65, 0.1);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.9);
      }
      .reference-label {
        margin: 0 0 10px;
        color: #77736e;
        font-size: 12px;
      }
      .reference-card img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 10px;
      }
    </style>
    <script>
      const originalFetch = window.fetch.bind(window);
      window.fetch = async (input, init) => {
        const url = typeof input === "string" ? input : input.url;
        if (url === "https://claude.ai/api/bootstrap") {
          return new Response(
            JSON.stringify({ organization_id: "11111111-1111-4111-8111-111111111111" }),
            { status: 200, headers: { "Content-Type": "application/json" } },
          );
        }
        if (url.includes("/api/organizations/") && url.endsWith("/usage")) {
          return new Response(
            JSON.stringify({
              five_hour: {
                utilization: 87,
                resets_at: new Date(Date.now() + 30 * 60 * 1000).toISOString(),
              },
              seven_day: {
                utilization: 18,
                resets_at: new Date(Date.now() + 81 * 60 * 60 * 1000).toISOString(),
              },
              limits: [
                {
                  kind: "weekly_scoped",
                  group: "weekly",
                  percent: 31,
                  resets_at: new Date(Date.now() + 81 * 60 * 60 * 1000).toISOString(),
                  scope: { model: { display_name: "Fable" } },
                },
              ],
            }),
            { status: 200, headers: { "Content-Type": "application/json" } },
          );
        }
        return originalFetch(input, init);
      };
    </script>
    <script src="../claude-usage-icons.user.js"></script>
    <script src="../claude-chatgpt-usage.user.js" defer></script>
  </head>
  <body>
    <div class="preview-note">Claude 用量浮窗 · 生成图标集成预览</div>
    <section class="reference-card">
      <p class="reference-label">图标设计源图</p>
      <img src="../assets/claude-usage-icons/source-sheet-v2.png" alt="生成图标设计源图">
    </section>
    <script>
      window.addEventListener("load", () => {
        const openWidget = () => {
          const host = document.getElementById("claude-usage-panel-bottom");
          const compact = host?.shadowRoot?.querySelector('[data-action="expand"]');
          if (!compact) {
            requestAnimationFrame(openWidget);
            return;
          }
          compact.click();
        };
        openWidget();
      });
    </script>
  </body>
</html>
